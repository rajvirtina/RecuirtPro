# ═══════════════════════════════════════════════════════════
# RecuirtPro AWS EC2 — Nginx Reverse Proxy
# Place at /etc/nginx/sites-available/recruitpro
# ═══════════════════════════════════════════════════════════

upstream backend_api {
    server 127.0.0.1:5001;
}

upstream llm_service {
    server 127.0.0.1:8001;
}

server {
    listen 80;
    server_name api.your-domain.com;  # Replace with your AWS domain

    # Redirect HTTP to HTTPS (uncomment after SSL setup)
    # return 301 https://$host$request_uri;

    client_max_body_size 10M;

    # API proxy
    location /api/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Socket.IO WebSocket
    location /socket.io/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    # LLM service proxy (internal only — restrict in production)
    location /llm/ {
        proxy_pass http://llm_service/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Health check
    location /health {
        proxy_pass http://backend_api/health;
    }
}
