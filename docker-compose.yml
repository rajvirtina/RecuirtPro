version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: recruitpro-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: recruitpro
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - recruitpro-network

  redis:
    image: redis:7-alpine
    container_name: recruitpro-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - recruitpro-network

  # Uncomment when ready to run the backend in Docker
  # backend:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   container_name: recruitpro-backend
  #   restart: unless-stopped
  #   ports:
  #     - "5001:5001"
  #   environment:
  #     NODE_ENV: development
  #     MONGODB_URI: mongodb://admin:admin123@mongodb:27017/recruitpro?authSource=admin
  #     REDIS_HOST: redis
  #   depends_on:
  #     - mongodb
  #     - redis
  #   volumes:
  #     - ./backend:/app
  #     - /app/node_modules
  #   networks:
  #     - recruitpro-network

volumes:
  mongodb_data:
  mongodb_config:
  redis_data:

networks:
  recruitpro-network:
    driver: bridge
