version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: recruitpro-mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD must be set in .env}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-recruitpro}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - recruitpro-network

  redis:
    image: redis:7-alpine
    container_name: recruitpro-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - recruitpro-network

  # BUG-004: Backend service (Dockerfile is production-ready)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recruitpro-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-5001}:5001"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/recruitpro?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 5001
    env_file:
      - ./backend/.env.production
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_started
      llm-service:
        condition: service_healthy
    networks:
      - recruitpro-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  llm-service:
    build:
      context: ./llm-service
      dockerfile: Dockerfile
    container_name: recruitpro-llm-service
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      API_SECRET_KEY: ${LLM_API_SECRET_KEY:-default-secret-key}
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost:5000
      SERVICE_PORT: 8001
      LOG_LEVEL: INFO
    networks:
      - recruitpro-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mongodb_data:
  mongodb_config:
  redis_data:

networks:
  recruitpro-network:
    driver: bridge
